<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#0c1020"/>
    </linearGradient>

    <!-- Orange glow behind center -->
    <radialGradient id="centerGlow" cx="600" cy="280" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff5d01" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff5d01" stop-opacity="0"/>
    </radialGradient>

    <!-- Left card glow -->
    <radialGradient id="leftGlow" cx="260" cy="260" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff5d01" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff5d01" stop-opacity="0"/>
    </radialGradient>

    <!-- Right card glow -->
    <radialGradient id="rightGlow" cx="940" cy="260" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff5d01" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff5d01" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom overlay -->
    <linearGradient id="overlay" x1="0" y1="420" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d0f1a" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#0d0f1a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="1"/>
    </linearGradient>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.85" fill="#ffffff" fill-opacity="0.048"/>
    </pattern>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="450" y1="0" x2="750" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ff5d01" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#ff8c42" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff5d01" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>
  <rect width="1200" height="630" fill="url(#leftGlow)"/>
  <rect width="1200" height="630" fill="url(#rightGlow)"/>

  <!-- Stars / ambient sparkles -->
  <circle cx="72"  cy="48"  r="1.1" fill="#ffffff" opacity="0.4"/>
  <circle cx="185" cy="82"  r="0.8" fill="#ffffff" opacity="0.35"/>
  <circle cx="42"  cy="142" r="1.2" fill="#ffffff" opacity="0.28"/>
  <circle cx="310" cy="60"  r="0.9" fill="#ffffff" opacity="0.45"/>
  <circle cx="520" cy="52"  r="1"   fill="#ffffff" opacity="0.3"/>
  <circle cx="680" cy="75"  r="0.8" fill="#ffffff" opacity="0.38"/>
  <circle cx="890" cy="45"  r="1.1" fill="#ffffff" opacity="0.32"/>
  <circle cx="1050" cy="90" r="0.9" fill="#ffffff" opacity="0.4"/>
  <circle cx="1145" cy="55" r="1.2" fill="#ffffff" opacity="0.28"/>
  <circle cx="128" cy="155" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="440" cy="88"  r="1.4" fill="#ffffff" opacity="0.42"/>
  <circle cx="960" cy="120" r="1.3" fill="#ffffff" opacity="0.38"/>

  <!-- ── LEFT CARD: Contact Form ── -->
  <rect x="62" y="100" width="396" height="330" rx="14"
    fill="#111827" fill-opacity="0.9"
    stroke="#ff5d01" stroke-opacity="0.2" stroke-width="1.2"/>

  <!-- Card header bar -->
  <rect x="62" y="100" width="396" height="48" rx="14" fill="#1a2235"/>
  <rect x="62" y="128" width="396" height="20" fill="#1a2235"/>

  <!-- Window dots -->
  <circle cx="90"  cy="124" r="6" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="112" cy="124" r="6" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="134" cy="124" r="6" fill="#22c55e" fill-opacity="0.7"/>

  <!-- Card title -->
  <text x="260" y="129"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="0.5"
  >Contact Form</text>

  <!-- Form field: Name -->
  <text x="90" y="178"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#64748b" letter-spacing="0.5"
  >NAME</text>
  <rect x="90" y="185" width="336" height="34" rx="6"
    fill="#0d1120" stroke="#334155" stroke-width="1"/>
  <text x="106" y="207"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" fill="#94a3b8"
  >Astro Rocket</text>

  <!-- Form field: Email -->
  <text x="90" y="240"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#64748b" letter-spacing="0.5"
  >EMAIL</text>
  <rect x="90" y="247" width="336" height="34" rx="6"
    fill="#0d1120" stroke="#ff5d01" stroke-opacity="0.5" stroke-width="1.2"/>
  <text x="106" y="269"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" fill="#ff8c42" fill-opacity="0.85"
  >hello@example.com</text>
  <!-- Cursor blink -->
  <rect x="269" y="256" width="1.5" height="16" rx="1" fill="#ff5d01" opacity="0.8"/>

  <!-- Form field: Message -->
  <text x="90" y="302"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#64748b" letter-spacing="0.5"
  >MESSAGE</text>
  <rect x="90" y="309" width="336" height="66" rx="6"
    fill="#0d1120" stroke="#334155" stroke-width="1"/>
  <text x="106" y="328"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" fill="#94a3b8"
  >Hey Hans, love the site! Would you...</text>
  <text x="106" y="346"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" fill="#475569"
  >be open to collaborating on...</text>

  <!-- Submit button -->
  <rect x="90" y="390" width="336" height="38" rx="8"
    fill="#ff5d01" fill-opacity="0.9"/>
  <text x="258" y="414"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle"
  >Send Message →</text>

  <!-- ── CENTER: Flow arrow + Resend ── -->

  <!-- Flow line -->
  <line x1="458" y1="265" x2="742" y2="265"
    stroke="url(#arrowGrad)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Arrow head -->
  <polygon points="742,258 756,265 742,272" fill="#ff8c42" opacity="0.85"/>

  <!-- Resend badge (center) -->
  <rect x="527" y="236" width="146" height="58" rx="10"
    fill="#0d1120" stroke="#ff5d01" stroke-opacity="0.35" stroke-width="1.2"/>

  <!-- Resend "R" lettermark -->
  <text x="552" y="273"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28" font-weight="700" fill="#ffffff"
  >R</text>

  <text x="576" y="263"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="14" font-weight="600" fill="#f1f5f9"
  >Resend</text>
  <text x="576" y="280"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10" fill="#64748b" letter-spacing="0.4"
  >Email API</text>

  <!-- "email sent" pulse -->
  <circle cx="600" cy="340" r="18" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="600" cy="340" r="10" fill="#22c55e" fill-opacity="0.2"/>
  <text x="600" y="345"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" fill="#4ade80" text-anchor="middle"
  >✓</text>
  <text x="600" y="375"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#22c55e" text-anchor="middle" letter-spacing="0.4"
  >Delivered</text>

  <!-- ── RIGHT CARD: Vercel + API Route ── -->
  <rect x="742" y="100" width="396" height="330" rx="14"
    fill="#111827" fill-opacity="0.9"
    stroke="#ff5d01" stroke-opacity="0.2" stroke-width="1.2"/>

  <!-- Card header bar -->
  <rect x="742" y="100" width="396" height="48" rx="14" fill="#1a2235"/>
  <rect x="742" y="128" width="396" height="20" fill="#1a2235"/>

  <!-- Window dots -->
  <circle cx="770" cy="124" r="6" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="792" cy="124" r="6" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="814" cy="124" r="6" fill="#22c55e" fill-opacity="0.7"/>

  <!-- Card title -->
  <text x="940" y="129"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="0.5"
  >Vercel · API Route</text>

  <!-- Vercel triangle -->
  <polygon points="940,158 978,222 902,222" fill="#ffffff" opacity="0.9"/>

  <!-- Vercel label -->
  <text x="940" y="250"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.4"
  >Vercel</text>

  <!-- Deployed badge -->
  <rect x="875" y="262" width="130" height="26" rx="13"
    fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.35" stroke-width="1"/>
  <text x="940" y="280"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="11" fill="#4ade80" text-anchor="middle" letter-spacing="0.6"
  >● Production</text>

  <!-- API route code snippet -->
  <rect x="770" y="300" width="340" height="100" rx="8"
    fill="#050810" stroke="#334155" stroke-width="1"/>

  <text x="790" y="322"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#64748b"
  >// pages/api/contact.ts</text>

  <text x="790" y="342"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#7c6af7"
  >export </text>
  <text x="844" y="342"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#38bdf8"
  >async function </text>
  <text x="978" y="342"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#fbbf24"
  >POST</text>

  <text x="790" y="362"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#94a3b8"
  >  await resend.</text>
  <text x="889" y="362"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#fbbf24"
  >emails.send</text>
  <text x="976" y="362"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#94a3b8"
  >({</text>

  <text x="790" y="382"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#94a3b8"
  >    </text>
  <text x="810" y="382"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#4ade80"
  >to: </text>
  <text x="840" y="382"
    font-family="ui-monospace, 'Cascadia Code', 'Fira Code', 'Courier New', monospace"
    font-size="12" fill="#ff8c42"
  >'you@domain.com'</text>

  <!-- ── Bottom overlay + title + author ── -->
  <rect x="0" y="420" width="1200" height="210" fill="url(#overlay)"/>

  <!-- Post title -->
  <text x="600" y="522"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26" font-weight="600"
    fill="#f1f5f9" text-anchor="middle" letter-spacing="0.2"
  >How I Set Up a Working Contact Form with Resend and Vercel</text>

  <!-- Author pill -->
  <rect x="476" y="548" width="248" height="36" rx="18"
    fill="#ff5d01" fill-opacity="0.08"
    stroke="#ff5d01" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="571"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" fill="#ff8c42" text-anchor="middle" letter-spacing="1.5"
  >hansmartens.dev · Astro Rocket</text>
</svg>
