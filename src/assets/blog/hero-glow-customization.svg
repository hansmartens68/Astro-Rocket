<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bi-bd { display: none }
    html.dark .bi-bl { display: none }
    html.dark .bi-bd { display: block }
    .bi-ic { stroke: #3d6b0c }
    html.dark .bi-ic { stroke: #a3e635 }
    .bi-tt { fill: #0c1a2e }
    html.dark .bi-tt { fill: #f0fce5 }
    .bi-sl { stroke: rgba(132,204,22,.5) }
    html.dark .bi-sl { stroke: rgba(163,230,53,.25) }
    .bi-bb { fill: rgba(132,204,22,.12); stroke: rgba(53,115,10,.4) }
    html.dark .bi-bb { fill: rgba(163,230,53,.08); stroke: rgba(163,230,53,.3) }
    .bi-bt { fill: #3f6212 }
    html.dark .bi-bt { fill: #a3e635 }
    .bi-cr { stroke: #84cc16 }
  </style>

  <defs>
    <linearGradient id="hgc-bl" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fce5"/>
    </linearGradient>
    <linearGradient id="hgc-bd" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#162236"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#hgc-bl)" class="bi-bl"/>
  <rect width="1200" height="630" fill="url(#hgc-bd)" class="bi-bd"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#84cc16"/>

  <!-- Lucide Layers icon — scale 11, centred at (600, 240) -->
  <g transform="translate(540, 180) scale(5)"
     stroke="#3d6b0c" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" fill="none"
     class="bi-ic">
    <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/>
    <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>
    <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
  </g>

  <!-- Title -->
  <text
    x="600" y="490"
    font-family="'Outfit Variable', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="120" font-weight="800" fill="#0c1a2e"
    text-anchor="middle" letter-spacing="-4"
    class="bi-tt">hero glow</text>

  <!-- Separator -->
  <line x1="380" y1="516" x2="820" y2="516"
        stroke="rgba(132,204,22,0.5)" stroke-width="1" class="bi-sl"/>

  <!-- Badge -->
  <rect x="450" y="548" width="300" height="38" rx="19"
        fill="rgba(132,204,22,0.12)" stroke="rgba(53,115,10,0.4)" stroke-width="1" class="bi-bb"/>
  <text
    x="600" y="572"
    font-family="'Outfit Variable', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" fill="#3f6212" text-anchor="middle" letter-spacing="1.5"
    class="bi-bt">ASTRO ROCKET THEME</text>

  <!-- Corner brackets -->
  <path d="M 36 60 L 36 36 L 60 36"          stroke-width="2" fill="none" class="bi-cr"/>
  <path d="M 1140 36 L 1164 36 L 1164 60"    stroke-width="2" fill="none" class="bi-cr"/>
  <path d="M 36 570 L 36 594 L 60 594"       stroke-width="2" fill="none" class="bi-cr"/>
  <path d="M 1140 594 L 1164 594 L 1164 570" stroke-width="2" fill="none" class="bi-cr"/>
</svg>
