      <stop offset="100%" stop-color="#0d0b1e"/>
    </linearGradient>
    <radialGradient id="glowMain" cx="600" cy="280" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.18"/>
