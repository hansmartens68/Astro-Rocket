<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060818"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>

    <!-- Central indigo glow -->
    <radialGradient id="glowMain" cx="600" cy="310" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>

    <!-- Focused glow around rocket -->
    <radialGradient id="glowRocket" cx="600" cy="230" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- "astro" text gradient: near-white → light indigo → periwinkle -->
    <linearGradient id="textGrad" x1="200" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="45%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="lineGrad" x1="380" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#818cf8" stop-opacity="0.38"/>
      <stop offset="70%"  stop-color="#818cf8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="19" cy="19" r="0.78" fill="#ffffff" fill-opacity="0.042"/>
    </pattern>
  </defs>

  <!-- ── Background layers ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glowMain)"/>
  <ellipse cx="600" cy="230" rx="210" ry="185" fill="url(#glowRocket)"/>

  <!-- ── Stars ── -->
  <circle cx="88"   cy="50"  r="1.2" fill="#ffffff" opacity="0.50"/>
  <circle cx="198"  cy="30"  r="0.8" fill="#ffffff" opacity="0.40"/>
  <circle cx="355"  cy="66"  r="0.9" fill="#ffffff" opacity="0.45"/>
  <circle cx="478"  cy="36"  r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="55"   cy="188" r="1.0" fill="#ffffff" opacity="0.28"/>
  <circle cx="65"   cy="400" r="0.9" fill="#ffffff" opacity="0.20"/>
  <circle cx="148"  cy="455" r="0.8" fill="#ffffff" opacity="0.18"/>
  <circle cx="820"  cy="46"  r="1.0" fill="#ffffff" opacity="0.50"/>
  <circle cx="932"  cy="26"  r="0.8" fill="#ffffff" opacity="0.40"/>
  <circle cx="1062" cy="58"  r="1.3" fill="#ffffff" opacity="0.36"/>
  <circle cx="1140" cy="126" r="0.9" fill="#ffffff" opacity="0.30"/>
  <circle cx="1158" cy="232" r="0.7" fill="#ffffff" opacity="0.24"/>
  <circle cx="1145" cy="420" r="0.8" fill="#ffffff" opacity="0.20"/>
  <circle cx="305"  cy="86"  r="1.7" fill="#ffffff" opacity="0.60"/>
  <circle cx="884"  cy="66"  r="1.6" fill="#ffffff" opacity="0.55"/>
  <circle cx="592"  cy="28"  r="1.3" fill="#ffffff" opacity="0.45"/>
  <circle cx="44"   cy="300" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="1164" cy="322" r="1.4" fill="#ffffff" opacity="0.30"/>
  <!-- Brand-tinted sparks — indigo + cyan (nice touch) -->
  <circle cx="225"  cy="520" r="2.2" fill="#6366f1" opacity="0.45"/>
  <circle cx="975"  cy="520" r="2.2" fill="#22d3ee" opacity="0.40"/>

  <!-- ── Lucide Rocket icon ── -->
  <g transform="translate(540, 187) scale(5)"
     stroke="#c7d2fe" stroke-width="1.80" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Flame / booster exhaust -->
    <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
    <!-- Main rocket body -->
    <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
    <!-- Left stabilizer fin -->
    <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
    <!-- Bottom stabilizer fin -->
    <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
  </g>

  <!-- ── "astro" — lowercase, heavy, centered ── -->
  <text
    x="600" y="490"
    font-family="'Outfit Variable', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="150" font-weight="800"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-4"
  >astro</text>

  <!-- ── Thin gradient divider ── -->
  <line x1="380" y1="516" x2="820" y2="516" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- ── hansmartens.dev pill ── -->
  <rect x="476" y="548" width="248" height="38" rx="19"
    fill="#4f46e5" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.30" stroke-width="1"/>
  <text
    x="600" y="572"
    font-family="'Outfit Variable', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="13" fill="#818cf8" text-anchor="middle" letter-spacing="1.5"
  >hansmartens.dev</text>
</svg>
